<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo - Jogo de Digitação</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <main class="conteudo">
      <div class="container-jogo">
        <div class="painel-status">
          <div class="status-item">
            <span class="status-label">TEMPO</span>
            <span class="status-valor neon-tempo">60s</span>
          </div>
          <div class="status-item">
            <span class="status-label">ERROS</span>
            <span class="status-valor neon-erros">0</span>
          </div>
          <div class="status-item">
            <span class="status-label">PONTOS</span>
            <span class="status-valor neon-pontos">0000</span>
          </div>
        </div>

        <div class="caixa-frase">A carregar frase...</div>

        <input
          type="text"
          class="input-jogo"
          placeholder="Digite a frase aqui..."
          autofocus
          autocomplete="off"
        />

        <div class="controles-jogo">
          <a class="btn-voltar" href="../index.html">Voltar para o Menu</a>
        </div>
      </div>
    </main>

    <footer class="rodape">
      <p>© 2026 Jogo de Digitação. Desenvolvido com ⚡ por Bruno & Daniel</p>
    </footer>

    <script src="../scripts/script.js"></script>
  </body>
</html>
